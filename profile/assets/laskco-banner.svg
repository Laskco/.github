<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" role="img" aria-label="LASKCO retro terminal banner">
  <defs>
    <radialGradient id="screen" cx="50%" cy="50%" r="78%">
      <stop offset="0%" stop-color="#0c2410"/>
      <stop offset="55%" stop-color="#050e07"/>
      <stop offset="100%" stop-color="#020503"/>
    </radialGradient>
    <linearGradient id="bezel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1c1c1c"/>
      <stop offset="50%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#1c1c1c"/>
    </linearGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="80%">
      <stop offset="55%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.6"/>
    </radialGradient>
    <pattern id="scanlines" x="0" y="0" width="3" height="3" patternUnits="userSpaceOnUse">
      <rect width="3" height="1.4" fill="#000" opacity="0.22"/>
    </pattern>
    <filter id="phosphor" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- bezel -->
  <rect x="0" y="0" width="1200" height="400" rx="22" fill="url(#bezel)"/>
  <rect x="6" y="6" width="1188" height="388" rx="18" fill="#000"/>

  <!-- screen -->
  <rect x="22" y="22" width="1156" height="356" rx="14" fill="url(#screen)"/>

  <!-- header bar -->
  <g font-family="ui-monospace, 'SF Mono', Menlo, Consolas, 'Courier New', monospace" font-size="13">
    <text x="44" y="56" fill="#7ad97a" opacity="0.8">laskco@shelf</text>
    <text x="138" y="56" fill="#5fa05f" opacity="0.8">:</text>
    <text x="144" y="56" fill="#9bc8e0" opacity="0.85">~/projects</text>
    <text x="226" y="56" fill="#5fa05f" opacity="0.8">$</text>
    <text x="240" y="56" fill="#cfe8cf" opacity="0.95">cat README.md</text>
    <text x="1110" y="56" fill="#7ad97a" opacity="0.55">[ ON-AIR ]</text>
  </g>

  <line x1="44" y1="70" x2="1156" y2="70" stroke="#1f3a22" stroke-width="1" opacity="0.7"/>

  <!-- LASKCO ASCII -->
  <g font-family="ui-monospace, 'SF Mono', Menlo, Consolas, 'Courier New', monospace" font-size="22" fill="#7ef089" filter="url(#phosphor)" text-anchor="middle" xml:space="preserve">
    <text x="600" y="128">в–Ҳв–Ҳв•—      в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•— в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—в–Ҳв–Ҳв•—  в–Ҳв–Ҳв•— в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•— в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—</text>
    <text x="600" y="152">в–Ҳв–Ҳв•‘     в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•—в–Ҳв–Ҳв•”в•җв•җв•җв•җв•қв–Ҳв–Ҳв•‘ в–Ҳв–Ҳв•”в•қв–Ҳв–Ҳв•”в•җв•җв•җв•җв•қв–Ҳв–Ҳв•”в•җв•җв•җв–Ҳв–Ҳв•—</text>
    <text x="600" y="176">в–Ҳв–Ҳв•‘     в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•‘в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қ в–Ҳв–Ҳв•‘     в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘</text>
    <text x="600" y="200">в–Ҳв–Ҳв•‘     в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•‘в•ҡв•җв•җв•җв•җв–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в•җв–Ҳв–Ҳв•— в–Ҳв–Ҳв•‘     в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘</text>
    <text x="600" y="224">в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—в–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•‘в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•—в•ҡв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—в•ҡв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қ</text>
    <text x="600" y="248">в•ҡв•җв•җв•җв•җв•җв•җв•қв•ҡв•җв•қ  в•ҡв•җв•қв•ҡв•җв•җв•җв•җв•җв•җв•қв•ҡв•җв•қ  в•ҡв•җв•қ в•ҡв•җв•җв•җв•җв•җв•қ в•ҡв•җв•җв•җв•җв•җв•қ</text>
  </g>

  <!-- side meta -->
  <g font-family="ui-monospace, 'SF Mono', Menlo, Consolas, 'Courier New', monospace" font-size="11" fill="#7ad97a" opacity="0.55">
    <text x="44" y="312">// shelf.contents</text>
    <text x="44" y="328">  в”ңв”Җ mpvNova</text>
    <text x="44" y="344">  в”ңв”Җ youtube-ff-rw</text>
    <text x="44" y="360">  в””в”Җ shiny-tracker</text>
  </g>

  <g font-family="ui-monospace, 'SF Mono', Menlo, Consolas, 'Courier New', monospace" font-size="11" fill="#7ad97a" opacity="0.55" text-anchor="end">
    <text x="1156" y="312">// build.taste</text>
    <text x="1156" y="328">remote-first   = true</text>
    <text x="1156" y="344">honest-settings = true</text>
    <text x="1156" y="360">retro-ui       = when_it_fits</text>
  </g>

  <!-- scanlines -->
  <rect x="22" y="22" width="1156" height="356" rx="14" fill="url(#scanlines)" pointer-events="none"/>
  <!-- vignette -->
  <rect x="22" y="22" width="1156" height="356" rx="14" fill="url(#vignette)" pointer-events="none"/>

  <!-- power LED -->
  <circle cx="1166" cy="384" r="3" fill="#6bff7a">
    <animate attributeName="opacity" values="0.55;1;0.55" dur="2.4s" repeatCount="indefinite"/>
  </circle>
</svg>
